<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>图文展示模块</title>

    <style>
        /* 页面整体居中 */
        body {
            margin: 0;
            padding: 0;
        }

        /* 外层容器居中 */
        .container {
            width: 550px;
            margin: 50px auto;
            /* 水平居中 */
            background-color: #f2f2f2;
            /* 浅灰背景 */
            border: 1px solid #000;
            /* 黑色细边框 */
            padding: 15px;
            /* 内边距 */
            box-sizing: border-box;
        }

        /* 图片样式 */
        .container img {
            width: 200px;
            float: left;
            margin-right: 15px;
        }

        /* 文字样式 */
        .container p {
            font-size: 15px;
            line-height: 25px;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="image\微信图片_20260413203914_304_2.jpg" alt="示例图片">
        <p>
            这是一个图文并排展示模块。左侧是图片，右侧是文字描述内容。
            通过设置图片浮动实现图文排版效果，使页面结构更加清晰简洁。
            本模块采用基础CSS布局，不使用复杂特效，适合初学者练习HTML布局。
        </p>
    </div>

</body>

</html>
