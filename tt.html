<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
        }

        /* 顶部固定区域 */
        .top {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            background: #333;
        }

        /* 专门用于居中的父盒子 */
        .wrap {
            width: 400px;
            margin: 0 auto;
        }

        /* 小div */
        .item {
            width: 100px;
            height: 60px;

            background: red;
            color: white;

            float: left;

            text-align: center;
            line-height: 60px;
        }

        /* 清除浮动 */
        .wrap::after {
            content: "";
            display: block;
            clear: both;
        }

        /* 主体内容 */
        .main {
            margin-top: 60px;
            height: 2000px;
        }
    </style>
</head>

<body>

    <div class="top">

        <!-- 居中盒子 -->
        <div class="wrap">

            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>

        </div>

    </div>

    <div class="main">
        页面主体内容
    </div>

</body>

</html>
