<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>导航栏</title>

    <style>
        /* 清除默认边距 */
        body {
            margin: 0;
        }

        /* 导航栏 */
        .nav {
            background-color: #333;
            height: 60px;

            display: flex;
            align-items: center;
            /*垂直怎么排列*/
            justify-content: center;
            /*水平怎么排列*/

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
        }

        /* 导航链接 */
        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
        }

        /* 鼠标悬停 */
        .nav a:hover {
            color: yellow;
        }

        /* 主体内容 */
        .main {
            margin-top: 80px;
            padding: 20px;
            height: 2000px;
        }
    </style>
</head>

<body>

    <!-- 导航栏 -->
    <div class="nav">
        <a href="#">首页</a>
        <a href="#">商品</a>
        <a href="#">新闻</a>
        <a href="#">联系我们</a>
    </div>

    <!-- 页面主体 -->
    <div class="main">
        页面主体内容
    </div>

</body>

</html>
