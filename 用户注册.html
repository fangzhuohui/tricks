<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>用户注册</h1>
    <form>
        <table>
            <tr>
                <td>用户名：</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>密码：</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td>性别</td>
                <td>
                    <input type="radio" name="gender" value="male" id="male">
                    <label for="male">
                        <img src="image/male.png" alt="图片跑走啦" style="width:20px; height:20px;">
                    </label>

                    <input type="radio" name="gender" value="female" id="female">
                    <label for="female">
                        <img src="image/female.png" alt="图片跑走啦" style="width:20px; height:20px;">
                    </label>
                </td>
            </tr>
            <tr>
                <td>爱好</td>
                <td>
                    <ul>
                        <li>
                            <input type="checkbox" name="hobby" value="sport" id="sport">
                            <lable for="sport">
                                体育
                            </lable>
                        </li>

                        <li>
                            <input type="checkbox" name="hobby" value="art" id="art">
                            <lable for="sport">
                                美术
                            </lable>
                        </li>

                        <li>
                            <input type="checkbox" name="hobby" value="music" id="music">
                            <lable for="sport">
                                音乐
                            </lable>
                        </li>

                    </ul>
                </td>
            </tr>
            <tr>
                <td>生日</td>
                <td>
                    <select name="birth_year" style="width: 80px; margin-right: 5px;">
                        <option value="">年</option>
                        <option>1990</option>
                        <option>1991</option>
                        <option>1992</option>
                        <option>1993</option>
                        <option>1994</option>
                        <option>1995</option>
                        <option>1996</option>
                        <option>1997</option>
                        <option>1998</option>
                        <option>1999</option>
                        <option>2000</option>
                        <option>2001</option>
                        <option>2002</option>
                        <option>2003</option>
                        <option>2004</option>
                        <option>2005</option>
                        <option>2006</option>
                        <option>2007</option>
                    </select>
                    <select name="birth_month" style="width: 60px; margin-right: 5px;">
                        <option value="">月</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                    </select>
                    <select name="birth_day" style="width: 60px;">
                        <option value="">日</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                        <option>13</option>
                        <option>14</option>
                        <option>15</option>
                        <option>16</option>
                        <option>17</option>
                        <option>18</option>
                        <option>19</option>
                        <option>20</option>
                        <option>21</option>
                        <option>22</option>
                        <option>23</option>
                        <option>24</option>
                        <option>25</option>
                        <option>26</option>
                        <option>27</option>
                        <option>28</option>
                        <option>29</option>
                        <option>30</option>
                        <option>31</option>
                    </select>
                    </select>
                </td>
            </tr>
            <tr>
                <td>所在地区</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>婚姻状况</td>
                <td>
                    <input type="radio" name="" value="yihun" id="yihun">
                    <label for="yihun">
                        已婚
                    </label>

                    <input type="radio" name="" value="weihun" id="weihun">
                    <label for="weihun">
                        未婚
                    </label>

                    <input type="radio" name="" value="liyi" id="liyi">
                    <label for="liyi">
                        离异
                    </label>
                </td>
            </tr>
            <tr>
                <td>学历</td>
                <td>
                    <select name="education">
                        <option value="本科" selected>本科</option>
                        <option value="专科">专科</option>
                        <option value="硕士">硕士</option>
                        <option value="博士">博士</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>个人简介</td>
                <td>
                    <textarea name="intro" rows="2" cols="14" style="font-size: 15px;"></textarea>
                </td>
            </tr>
            <tr>
                <td>我的照片</td>
                <td>
                    <input type="file" name="photo" style="font-size: 15px; width: 250px;">
                </td>
                <td>
                    <button type="submit" style="font-size: 15px; padding: 3px 14px;">提交</button>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <button type="submit" style="font-size: 15px; padding: 2px 6px;">免费注册</button>
                </td>

            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="checkbox" name="agree" id="agree" checked>
                    <label for="agree">我同意注册条款和会员加入信息</label>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <a href=" ">立即登录</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
